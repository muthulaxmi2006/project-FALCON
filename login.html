<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>body { visibility: hidden; }</style>
  <script>
    (function() {
      if (window.location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.cssText = 'margin:0;padding:0;background:#050c15;visibility:visible;';
          document.body.innerHTML = `
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                 font-family:'Segoe UI',sans-serif;text-align:center;padding:20px">
              <div style="background:#0a1628;border:1px solid rgba(0,212,255,0.2);border-radius:16px;
                   padding:48px 40px;max-width:460px;box-shadow:0 0 60px rgba(0,132,255,0.1)">
                <div style="font-size:3rem;margin-bottom:16px">🛡️</div>
                <div style="font-size:1.5rem;font-weight:800;letter-spacing:4px;
                     background:linear-gradient(90deg,#0a84ff,#00d4ff);
                     -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                     margin-bottom:10px">FALCON</div>
                <div style="color:#ff3b5c;font-size:0.95rem;font-weight:600;margin-bottom:14px">
                  ⚠ Direct file access is blocked
                </div>
                <div style="color:#7a9fc0;font-size:0.83rem;line-height:1.8;margin-bottom:26px">
                  This project only runs through the local server.<br>
                  Open a terminal in the project folder and run:
                </div>
                <div style="background:#020812;border:1px solid rgba(0,212,255,0.15);
                     border-radius:8px;padding:12px 20px;font-family:'Courier New',monospace;
                     color:#00d4ff;font-size:0.9rem;letter-spacing:1px;margin-bottom:26px">
                  python server.py
                </div>
                <div style="color:#3d5a78;font-size:0.78rem;margin-bottom:6px">then open your browser at</div>
                <a href="http://localhost:5000" style="color:#00d4ff;font-weight:700;
                   font-size:0.95rem;text-decoration:none">
                  http://localhost:5000
                </a>
              </div>
            </div>`;
        });
      } else {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.visibility = 'visible';
        });
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project FALCON – Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-deep:   #e8f2fc;
      --bg-card:   #ffffff;
      --bg-card2:  #f0f7ff;
      --border:    #c8dff2;
      --blue:      #1a7fd4;
      --cyan:      #0099cc;
      --green:     #16a34a;
      --red:       #dc2626;
      --text:      #0f2744;
      --muted:     #7a9fc0;
      --secondary: #3a6494;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
    }

    /* ---- Background ---- */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(26,127,212,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,127,212,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* ---- Glow orbs ---- */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.12; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: #90c8f0; top: -100px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: #b8d8f5; bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: #a0d0f0; top: 40%; left: 60%; animation-delay: -2s; }
    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, 30px) scale(1.08); }
    }

    /* ---- Scan line overlay ---- */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
    }

    /* ---- Main layout ---- */
    .login-wrap {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #d0e4f7;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(10,80,160,0.1), 0 1px 4px rgba(10,80,160,0.08);
      animation: boxIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
    }
    @keyframes boxIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent);
      border-radius: 0 0 3px 3px;
    }

    /* ---- Logo ---- */
    .logo-section {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-ring {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: #ffffff;
      box-shadow: 0 4px 20px rgba(26,127,212,0.3);
      position: relative;
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 4px 20px rgba(26,127,212,0.3); }
      50%      { box-shadow: 0 4px 32px rgba(26,127,212,0.5); }
    }
    .logo-ring::after {
      content: ''; position: absolute; inset: -4px;
      border-radius: 18px;
      border: 1px solid rgba(26,127,212,0.2);
    }
    .logo-name {
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: 4px;
      color: var(--blue);
    }
    .logo-tagline {
      font-size: 0.68rem; color: var(--muted);
      letter-spacing: 0.5px; text-align: center;
    }

    /* ---- Form ---- */
    .form-group {
      margin-bottom: 18px;
      position: relative;
    }
    .form-label { display: block; font-size: 0.73rem; font-weight: 700; color: var(--secondary); letter-spacing: 0.3px; margin-bottom: 7px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 13px; color: var(--muted); font-size: 0.82rem; pointer-events: none; transition: color 0.2s; }
    .form-input {
      width: 100%;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px 11px 38px;
      color: var(--text); font-size: 0.86rem; font-family: inherit; outline: none;
      transition: all 0.2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,127,212,0.12); background: #fff; }
    .input-wrap:focus-within .input-icon { color: var(--blue); }

    .eye-btn {
      position: absolute; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.85rem;
      transition: color 0.2s; padding: 4px;
    }
    .eye-btn:hover { color: var(--cyan); }

    /* ---- Options row ---- */
    .form-options {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .checkbox-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 0.8rem; color: var(--secondary);
    }
    .checkbox-wrap input[type="checkbox"] { display: none; }
    .custom-cb {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .checkbox-wrap input:checked + .custom-cb { background: var(--blue); border-color: var(--blue); }
    .custom-cb::after { content: '✓'; font-size: 0.7rem; color: #fff; opacity: 0; transition: opacity 0.15s; }
    .checkbox-wrap input:checked + .custom-cb::after { opacity: 1; }
    .forgot-link { font-size: 0.76rem; color: var(--blue); text-decoration: none; cursor: pointer; transition: opacity 0.2s; font-weight: 600; }
    .forgot-link:hover { opacity: 0.75; }

    .login-btn {
      width: 100%; padding: 12px;
      border-radius: 9px; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 0.5px;
      color: #fff;
      background: var(--blue);
      box-shadow: 0 3px 12px rgba(26,127,212,0.35);
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .login-btn:hover { background: #1570bc; box-shadow: 0 6px 20px rgba(26,127,212,0.45); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn.loading { pointer-events: none; opacity: 0.85; }
    .btn-spinner { display: none; }
    .login-btn.loading .btn-spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    .login-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 0.7rem; color: var(--muted); font-weight: 600; }

    .quick-logins { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .quick-btn {
      padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card2);
      color: var(--secondary);
      font-size: 0.76rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .quick-btn:hover { border-color: #a8ccee; color: var(--blue); background: #deeefa; }
    .quick-btn i { font-size: 0.88rem; }

    .msg-box { display: none; padding: 10px 13px; border-radius: 8px; font-size: 0.78rem; margin-bottom: 14px; align-items: center; gap: 9px; }
    .msg-box.error   { display: flex; background: #fee2e2; border: 1px solid #fca5a5; color: var(--red); }
    .msg-box.success { display: flex; background: #dcfce7; border: 1px solid #86efac; color: var(--green); }

    .login-footer { margin-top: 22px; text-align: center; font-size: 0.7rem; color: var(--muted); }
    .login-footer span { color: var(--red); font-weight: 600; }

    .security-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 18px; }
    .sec-badge { display: flex; align-items: center; gap: 5px; font-size: 0.66rem; color: var(--muted); }
    .sec-badge i { color: var(--green); font-size: 0.68rem; }

    .particle { position: absolute; width: 3px; height: 3px; background: var(--blue); border-radius: 50%; opacity: 0; animation: particleFly linear infinite; }
    @keyframes particleFly { 0%{opacity:0;transform:translateY(100vh) scale(0)} 10%{opacity:0.4} 90%{opacity:0.15} 100%{opacity:0;transform:translateY(-20px) scale(1.5)} }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="scanlines"></div>
  <div class="particles" id="particles"></div>

  <div class="login-wrap">
    <div class="login-box">

      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-ring">
          <i class="fas fa-shield-halved"></i>
        </div>
        <div class="logo-name">FALCON</div>
        <div class="logo-tagline">AI-POWERED NETWORK INTRUSION DETECTION SYSTEM</div>
      </div>

      <!-- Error / Success -->
      <div class="msg-box" id="msgBox">
        <i class="fas fa-circle-exclamation"></i>
        <span id="msgText"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">

        <div class="form-group">
          <label class="form-label">USERNAME / EMAIL</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="form-input" id="username"
              placeholder="Enter your username" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-input" id="password"
              placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="eye-btn" id="eyeBtn">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="rememberMe" />
            <div class="custom-cb"></div>
            Remember me
          </label>
          <a class="forgot-link" id="forgotLink">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-spinner btn-spinner"></i>
          <span class="btn-text"><i class="fas fa-right-to-bracket"></i> &nbsp;ACCESS SYSTEM</span>
        </button>

      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">QUICK ACCESS</span>
        <div class="divider-line"></div>
      </div>

      <div class="quick-logins">
        <button class="quick-btn" onclick="fillDemo('admin','admin123')">
          <i class="fas fa-user-shield"></i> Admin Demo
        </button>
        <button class="quick-btn" onclick="fillDemo('analyst','analyst123')">
          <i class="fas fa-magnifying-glass-chart"></i> Analyst Demo
        </button>
      </div>

      <!-- Security badges -->
      <div class="security-row">
        <div class="sec-badge"><i class="fas fa-lock"></i> AES-256 Encrypted</div>
        <div class="sec-badge"><i class="fas fa-shield-check"></i> SOC 2 Compliant</div>
        <div class="sec-badge"><i class="fas fa-user-check"></i> 2FA Ready</div>
      </div>

      <div class="login-footer">
        Project FALCON v4.2.1 &nbsp;·&nbsp;
        <span>Unauthorized access is prohibited</span>
      </div>

    </div>
  </div>

  <script>
    // ============================================================
    // CREDENTIALS (change these to your own)
    // ============================================================
    const USERS = [
      { username: 'admin',        password: 'admin123',   role: 'SOC Admin',    name: 'Admin User'    },
      { username: 'analyst',      password: 'analyst123', role: 'SOC Analyst',  name: 'SOC Analyst'   },
      { username: 'admin@falcon.ai', password: 'admin123', role: 'SOC Admin',   name: 'Admin User'    },
    ];

    // ============================================================
    // PARTICLES
    // ============================================================
    (function spawnParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left     = Math.random() * 100 + 'vw';
        p.style.animationDuration = (6 + Math.random() * 10) + 's';
        p.style.animationDelay   = (Math.random() * 10) + 's';
        p.style.width  = (Math.random() > 0.5 ? 2 : 1) + 'px';
        p.style.height = p.style.width;
        p.style.background = Math.random() > 0.5 ? '#00d4ff' : '#0a84ff';
        container.appendChild(p);
      }
    })();

    // ============================================================
    // SHOW / HIDE PASSWORD
    // ============================================================
    document.getElementById('eyeBtn').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    // ============================================================
    // QUICK FILL
    // ============================================================
    function fillDemo(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
      document.getElementById('username').dispatchEvent(new Event('input'));
    }

    // ============================================================
    // SHOW MESSAGE
    // ============================================================
    function showMsg(type, text) {
      const box  = document.getElementById('msgBox');
      const span = document.getElementById('msgText');
      box.className = 'msg-box ' + type;
      const icon = box.querySelector('i');
      icon.className = type === 'error'
        ? 'fas fa-circle-exclamation'
        : 'fas fa-circle-check';
      span.textContent = text;
    }
    function hideMsg() {
      document.getElementById('msgBox').className = 'msg-box';
    }

    // ============================================================
    // REMEMBER ME — persist username
    // ============================================================
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('falcon_user');
      if (saved) {
        document.getElementById('username').value = saved;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // ============================================================
    // LOGIN LOGIC
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      hideMsg();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const btn      = document.getElementById('loginBtn');

      // Basic validation
      if (!username) { showMsg('error', 'Please enter your username.'); return; }
      if (!password) { showMsg('error', 'Please enter your password.'); return; }

      // Loading state
      btn.classList.add('loading');

      // Simulate auth delay (replace with real API call if needed)
      setTimeout(() => {
        const user = USERS.find(u =>
          (u.username === username || u.username === username.toLowerCase()) &&
          u.password === password
        );

        if (user) {
          // Save session
          sessionStorage.setItem('falcon_auth', JSON.stringify({
            name:    user.name,
            role:    user.role,
            loginAt: new Date().toISOString()
          }));

          if (remember) {
            localStorage.setItem('falcon_user', username);
          } else {
            localStorage.removeItem('falcon_user');
          }

          showMsg('success', 'Access granted. Loading dashboard...');
          btn.classList.remove('loading');

          // Redirect after short delay
          setTimeout(() => { window.location.href = '/index.html'; }, 900);

        } else {
          btn.classList.remove('loading');
          showMsg('error', 'Invalid credentials. Access denied.');

          // Shake the form
          const box = document.querySelector('.login-box');
          box.style.animation = 'none';
          box.style.transition = 'transform 0.08s';
          let s = 0;
          const shakeIv = setInterval(() => {
            box.style.transform = `translateX(${s % 2 === 0 ? -6 : 6}px)`;
            s++;
            if (s > 6) { clearInterval(shakeIv); box.style.transform = ''; }
          }, 60);
        }
      }, 1200);
    });

    // ============================================================
    // FORGOT PASSWORD
    // ============================================================
    document.getElementById('forgotLink').addEventListener('click', () => {
      showMsg('success', 'Contact your SOC administrator to reset your password.');
    });

    // ============================================================
    // LOCALHOST ENFORCEMENT
    // ============================================================
    (function() {
      if (window.location.protocol === 'file:') {
        document.body.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
               background:#050c15;font-family:'Segoe UI',sans-serif;text-align:center;padding:20px">
            <div style="background:#0a1628;border:1px solid rgba(0,212,255,0.2);border-radius:16px;
                 padding:48px 40px;max-width:460px;box-shadow:0 0 60px rgba(0,132,255,0.1)">
              <div style="font-size:3rem;margin-bottom:16px">🛡️</div>
              <div style="font-size:1.4rem;font-weight:800;letter-spacing:3px;
                   background:linear-gradient(90deg,#0a84ff,#00d4ff);
                   -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                   margin-bottom:10px">FALCON</div>
              <div style="color:#ff3b5c;font-size:1rem;font-weight:600;margin-bottom:12px">
                ⚠ Direct file access is not allowed
              </div>
              <div style="color:#7a9fc0;font-size:0.85rem;line-height:1.7;margin-bottom:28px">
                This project must be run through the local server.<br>
                Open a terminal in the project folder and run:
              </div>
              <div style="background:#020812;border:1px solid rgba(0,212,255,0.15);border-radius:8px;
                   padding:14px 20px;font-family:'Courier New',monospace;color:#00d4ff;
                   font-size:0.95rem;letter-spacing:1px;margin-bottom:28px">
                python server.py
              </div>
              <div style="color:#7a9fc0;font-size:0.8rem">
                Then visit &nbsp;
                <a href="http://localhost:5000" style="color:#00d4ff;text-decoration:none;
                   font-weight:600">http://localhost:5000</a>
              </div>
            </div>
          </div>`;
      }
    })();
  </script>

</body>
</html>
