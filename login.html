<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>body{visibility:hidden;}</style>
  <script>
    (function(){
      if(window.location.protocol==='file:'){
        document.addEventListener('DOMContentLoaded',function(){
          document.body.style.cssText='margin:0;padding:0;background:#e8f4ff;visibility:visible;';
          document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Segoe UI,sans-serif;background:#e8f4ff"><div style="background:#fff;border:1px solid #d0e4f7;border-radius:16px;padding:48px 40px;max-width:460px;text-align:center;box-shadow:0 4px 24px rgba(21,101,192,0.12)"><div style="font-size:3rem;margin-bottom:16px">🛡️</div><div style="font-size:1.4rem;font-weight:800;letter-spacing:3px;color:#1565c0;margin-bottom:10px">FALCON</div><div style="color:#c62828;font-size:0.95rem;font-weight:600;margin-bottom:12px">⚠ Direct file access is blocked</div><div style="color:#7a9fc0;font-size:0.83rem;line-height:1.8;margin-bottom:26px">Run the server first:<br><code style="background:#f0f8ff;padding:4px 10px;border-radius:4px;color:#1565c0">python server.py</code></div><a href="http://localhost:5000" style="color:#1565c0;font-weight:700">http://localhost:5000</a></div></div>`;
        });
      } else {
        document.addEventListener('DOMContentLoaded',function(){ document.body.style.visibility='visible'; });
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project FALCON – Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#e8f4ff;color:#0f2744;overflow:hidden;}
.bg{position:fixed;inset:0;background-image:linear-gradient(rgba(21,101,192,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(21,101,192,0.05) 1px,transparent 1px);background-size:40px 40px;}
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{width:100%;max-width:420px;background:#fff;border:1px solid #d0e4f7;border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(21,101,192,0.12);position:relative;}
.box::before{content:'';position:absolute;top:0;left:10%;right:10%;height:3px;background:linear-gradient(90deg,transparent,#1565c0,#0288d1,transparent);border-radius:0 0 3px 3px;}
.logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:30px;}
.logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1565c0,#0288d1);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;box-shadow:0 4px 20px rgba(21,101,192,0.35);}
.logo-name{font-size:1.5rem;font-weight:800;letter-spacing:4px;color:#1565c0;}
.logo-tag{font-size:0.68rem;color:#7a9fc0;text-align:center;}
.lbl{display:block;font-size:0.73rem;font-weight:700;color:#3a6494;margin-bottom:7px;letter-spacing:0.3px;}
.inp-wrap{position:relative;display:flex;align-items:center;margin-bottom:16px;}
.inp-icon{position:absolute;left:13px;color:#7a9fc0;font-size:0.82rem;}
.inp{width:100%;background:#f0f8ff;border:1px solid #d0e4f7;border-radius:9px;padding:11px 13px 11px 38px;color:#0f2744;font-size:0.86rem;font-family:inherit;outline:none;transition:all 0.2s;}
.inp:focus{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.12);background:#fff;}
.eye{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:#7a9fc0;font-size:0.82rem;transition:color 0.2s;}
.eye:hover{color:#1565c0;}
.opts{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cb-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.78rem;color:#3a6494;}
.cb-wrap input{display:none;}
.cb{width:16px;height:16px;border:1.5px solid #d0e4f7;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cb-wrap input:checked+.cb{background:#1565c0;border-color:#1565c0;}
.cb::after{content:'✓';font-size:0.7rem;color:#fff;opacity:0;transition:opacity 0.15s;}
.cb-wrap input:checked+.cb::after{opacity:1;}
.forgot{font-size:0.76rem;color:#1565c0;cursor:pointer;font-weight:600;}
.forgot:hover{opacity:0.75;}
.btn{width:100%;padding:12px;border-radius:9px;border:none;cursor:pointer;font-size:0.9rem;font-weight:700;letter-spacing:0.5px;color:#fff;background:#1565c0;box-shadow:0 3px 12px rgba(21,101,192,0.35);transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn:hover{background:#0d47a1;box-shadow:0 6px 20px rgba(21,101,192,0.45);transform:translateY(-1px);}
.btn.loading{pointer-events:none;opacity:0.85;}
.spin{display:none;}
.btn.loading .spin{display:inline-block;animation:spin 0.8s linear infinite;}
.btn.loading .btxt{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.div{display:flex;align-items:center;gap:12px;margin:20px 0;}
.div-line{flex:1;height:1px;background:#d0e4f7;}
.div-txt{font-size:0.7rem;color:#7a9fc0;font-weight:600;}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.qbtn{padding:9px 12px;border-radius:8px;border:1px solid #d0e4f7;background:#f0f8ff;color:#3a6494;font-size:0.76rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s;}
.qbtn:hover{border-color:#90caf9;color:#1565c0;background:#e3f2fd;}
.msg{display:none;padding:10px 13px;border-radius:8px;font-size:0.78rem;margin-bottom:14px;align-items:center;gap:9px;}
.msg.err{display:flex;background:#ffebee;border:1px solid #ef9a9a;color:#c62828;}
.msg.ok{display:flex;background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32;}
.sec-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;}
.sec{display:flex;align-items:center;gap:5px;font-size:0.66rem;color:#7a9fc0;}
.sec i{color:#2e7d32;font-size:0.68rem;}
.footer{margin-top:20px;text-align:center;font-size:0.7rem;color:#7a9fc0;}
.footer span{color:#c62828;font-weight:600;}
</style>

<div class="bg"></div>
<div class="wrap">
  <div class="box">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="logo-name">FALCON</div>
      <div class="logo-tag">AI-POWERED NETWORK INTRUSION DETECTION SYSTEM</div>
    </div>

    <div class="msg" id="msg"><i class="fas fa-circle-exclamation"></i><span id="msgTxt"></span></div>

    <form id="form" autocomplete="off">
      <label class="lbl">USERNAME</label>
      <div class="inp-wrap">
        <i class="fas fa-user inp-icon"></i>
        <input type="text" class="inp" id="username" placeholder="Enter your username" />
      </div>
      <label class="lbl">PASSWORD</label>
      <div class="inp-wrap">
        <i class="fas fa-lock inp-icon"></i>
        <input type="password" class="inp" id="password" placeholder="Enter your password" />
        <button type="button" class="eye" id="eye"><i class="fas fa-eye" id="eyeIco"></i></button>
      </div>
      <div class="opts">
        <label class="cb-wrap"><input type="checkbox" id="rem" /><div class="cb"></div>Remember me</label>
        <span class="forgot" id="fgt">Forgot password?</span>
      </div>
      <button type="submit" class="btn" id="loginBtn">
        <i class="fas fa-spinner spin"></i>
        <span class="btxt"><i class="fas fa-right-to-bracket"></i> &nbsp;ACCESS SYSTEM</span>
      </button>
    </form>

    <div class="div"><div class="div-line"></div><span class="div-txt">QUICK ACCESS</span><div class="div-line"></div></div>
    <div class="quick">
      <button class="qbtn" onclick="fill('admin','admin123')"><i class="fas fa-user-shield"></i> Admin Demo</button>
      <button class="qbtn" onclick="fill('analyst','analyst123')"><i class="fas fa-magnifying-glass-chart"></i> Analyst Demo</button>
    </div>

    <div class="sec-row">
      <div class="sec"><i class="fas fa-lock"></i> AES-256</div>
      <div class="sec"><i class="fas fa-shield-check"></i> SOC 2</div>
      <div class="sec"><i class="fas fa-user-check"></i> 2FA Ready</div>
    </div>
    <div class="footer">Project FALCON v4.2.1 &nbsp;·&nbsp; <span>Unauthorized access prohibited</span></div>
  </div>
</div>

<script>
const USERS=[{username:'admin',password:'admin123',role:'SOC Admin',name:'Admin User'},{username:'analyst',password:'analyst123',role:'SOC Analyst',name:'SOC Analyst'},{username:'admin@falcon.ai',password:'admin123',role:'SOC Admin',name:'Admin User'}];

window.addEventListener('load',()=>{const s=localStorage.getItem('falcon_user');if(s){document.getElementById('username').value=s;document.getElementById('rem').checked=true;}});

document.getElementById('eye').addEventListener('click',function(){const i=document.getElementById('password');const ic=document.getElementById('eyeIco');i.type=i.type==='password'?'text':'password';ic.className=i.type==='password'?'fas fa-eye':'fas fa-eye-slash';});

function fill(u,p){document.getElementById('username').value=u;document.getElementById('password').value=p;}

function showMsg(type,txt){const b=document.getElementById('msg');const s=document.getElementById('msgTxt');b.className='msg '+(type==='err'?'err':'ok');b.querySelector('i').className=type==='err'?'fas fa-circle-exclamation':'fas fa-circle-check';s.textContent=txt;}

document.getElementById('fgt').addEventListener('click',()=>showMsg('ok','Contact your SOC administrator to reset your password.'));

document.getElementById('form').addEventListener('submit',function(e){
  e.preventDefault();
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const r=document.getElementById('rem').checked;
  const btn=document.getElementById('loginBtn');
  if(!u){showMsg('err','Please enter your username.');return;}
  if(!p){showMsg('err','Please enter your password.');return;}
  btn.classList.add('loading');
  setTimeout(()=>{
    const user=USERS.find(x=>(x.username===u||x.username===u.toLowerCase())&&x.password===p);
    if(user){
      sessionStorage.setItem('falcon_auth',JSON.stringify({name:user.name,role:user.role,loginAt:new Date().toISOString()}));
      if(r)localStorage.setItem('falcon_user',u);else localStorage.removeItem('falcon_user');
      showMsg('ok','Access granted. Loading dashboard...');
      btn.classList.remove('loading');
      setTimeout(()=>{window.location.href='/index.html';},900);
    } else {
      btn.classList.remove('loading');
      showMsg('err','Invalid credentials. Access denied.');
      const box=document.querySelector('.box');
      let s=0;const iv=setInterval(()=>{box.style.transform=`translateX(${s%2===0?-6:6}px)`;s++;if(s>6){clearInterval(iv);box.style.transform='';}},60);
    }
  },1200);
});
</script>
</body>
</html>
